<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Artifen Logo -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Symbol: Stylized 'A' - an interlocking shape representing the bridge between human creativity and AI -->
  <rect x="5" y="15" width="80" height="80" rx="18" fill="url(#grad)"/>
  
  <!-- A shape -->
  <path d="M27 75 L45 28 L63 75" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="33" y1="63" x2="57" y2="63" stroke="white" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Accent dot -->
  <circle cx="63" cy="38" r="3.5" fill="#22D3EE"/>

  <!-- Text -->
  <text x="102" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" letter-spacing="-1" fill="#1E1B4B">
    Artifen
  </text>
  <text x="104" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" letter-spacing="3.5" fill="#0891B2">
    BUILD SMARTER
  </text>
</svg>